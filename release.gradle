jreleaser {
    dryrun = false
    signing {
        active = 'ALWAYS'
        armored = true
    }
    deploy {
        maven {
            mavenCentral {
                sonatype {
                    active = 'ALWAYS'
                    stage = 'FULL'
                    url = 'https://central.sonatype.com/api/v1/publisher'
                    stagingRepository('build/staging-deploy')
                    namespace = 'se.svt'
                    authorization = 'BASIC'
                    applyMavenCentralRules = true
                }
            }
        }
    }
    release {
        github {
            enabled = false
        }
    }
}